publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+3

environment:
  sdk: ^3.10.7

dependencies:
  cookie_jar: ^4.0.8
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.7.0
  envied: ^1.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  gap: ^3.0.1
  get_it: ^8.0.2
  go_router: ^14.6.0
  injectable: ^2.5.0
  intl: ^0.20.0
  json_annotation: ^4.9.0
  jwt_decoder: ^2.0.1
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.11
  change_app_package_name: ^1.5.0
  envied_generator: ^1.0.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  icons_launcher: ^3.0.3
  injectable_generator: ^2.6.2
